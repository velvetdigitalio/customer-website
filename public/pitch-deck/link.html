<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deck Link Generator</title>
<meta name="robots" content="noindex,nofollow">
<style>
  body{background:#15100a;color:#e7e1d4;font-family:Georgia,serif;display:flex;min-height:100vh;align-items:center;justify-content:center;}
  .box{width:min(560px,90vw);}
  h1{font-weight:400;color:#f1ead9;font-size:28px;margin-bottom:24px;}
  label{display:block;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#b9b0a0;margin:18px 0 6px;font-family:sans-serif;}
  input,select{width:100%;padding:12px;background:#0d0804;border:1px solid rgba(205,176,128,.35);color:#f1ead9;font-size:17px;border-radius:2px;}
  button{margin-top:24px;padding:12px 28px;background:#c9a45c;color:#15100a;border:none;font-size:15px;letter-spacing:.08em;cursor:pointer;border-radius:2px;font-family:sans-serif;font-weight:600;}
  .out{margin-top:22px;padding:14px;background:#0d0804;border:1px solid rgba(205,176,128,.35);word-break:break-all;font-family:monospace;font-size:14px;color:#d8b878;display:none;}
  .copied{color:#b9b0a0;font-size:13px;margin-top:8px;font-family:sans-serif;display:none;}
</style>
</head>
<body>
<div class="box">
  <h1>Personalized deck link</h1>
  <label>Client / business name</label>
  <input id="name" placeholder="Chetan Jewellers" maxlength="80">
  <label>Industry</label>
  <select id="ind"><option value="jewellery">Jewellery</option><option value="interiors">Interiors</option></select>
  <button id="go">Generate link</button>
  <div class="out" id="out"></div>
  <div class="copied" id="copied">Copied to clipboard.</div>
</div>
<script>
document.getElementById('go').addEventListener('click', async ()=>{
  const n = document.getElementById('name').value.trim();
  if(!n) return;
  const payload = JSON.stringify({n, i: document.getElementById('ind').value});
  const c = btoa(unescape(encodeURIComponent(payload))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const url = `${location.origin}${location.pathname.replace(/link\.html$/,'')}?c=${c}`;
  const out = document.getElementById('out');
  out.textContent = url; out.style.display = 'block';
  try{ await navigator.clipboard.writeText(url); document.getElementById('copied').style.display='block'; }catch(e){}
});
</script>
</body>
</html>
